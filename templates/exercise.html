<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<title>Упражнение</title>
<link rel="stylesheet" href="/static/style.css">
</head>

<body>

<div class="container">

<h1 id="exercise-title"></h1>

<table id="history-table">
<thead>
<tr>
<th>Дата</th>
<th>Подходы</th>
<th>Повторы</th>
<th>Вес</th>
</tr>
</thead>

<tbody></tbody>

</table>

</div>

<script>
const exerciseId = "{{ exercise_id }}"

async function loadExercise(){

    const res = await fetch(`/api/exercise/${exerciseId}`)
    const data = await res.json()

    document.getElementById("exercise-title").textContent = data.name
}

async function loadHistory(){

    const res = await fetch(`/api/exercise/${exerciseId}/history`)
    const data = await res.json()

    const tbody = document.querySelector("#history-table tbody")

    tbody.innerHTML = ""

    data.forEach(e => {

        const tr = document.createElement("tr")

        tr.innerHTML = `
        <td>${e.date}</td>
        <td>${e.sets}</td>
        <td>${e.reps}</td>
        <td>${e.weight}</td>
        `

        tbody.appendChild(tr)

    })

}

loadExercise()
loadHistory()
</script>

</body>
</html>
